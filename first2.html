<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Registration</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to right, rgb(38, 255, 0), rgb(242, 255, 0));
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    body:hover {
      background: linear-gradient(to right, rgb(0, 47, 255), rgb(124, 0, 128));
    }
    .container {
      margin-top: 20px;
      background: white;
      padding: 30px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 10px 50px 25px black;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: aqua;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>College Registration Form</h2>
    <form>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter Your Full Name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter Your Email" required>
      </div>
      <div class="form-group">
        <label>Contact</label>
        <input type="text" placeholder="Enter Your Contact" required>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" placeholder="Enter Your Address" required>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select required>
          <option value="">Select Department</option>
          <option value="computer science">Computer Science</option>
          <option value="mechanical">Mechanical</option>
          <option value="electrical">Electrical</option>
          <option value="civil">Civil</option>
          <option value="business">Business Administration</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year of Study</label>
        <select required>
          <option value="">Select Year</option>
          <option>1st Year</option>
          <option>2nd Year</option>
          <option>3rd Year</option>
          <option>4th Year</option>
        </select>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <div class="gender">
          <label><input type="radio" name="gender" required> Male</label>
          <label><input type="radio" name="gender" required> Female</label>
          <label><input type="radio" name="gender" required> Other</label>
        </div>
      </div>
      <div class="form-group">
        <label>Why do you want to participate?</label>
        <textarea rows="3" placeholder="Write your reason..." required></textarea>
      </div>
      <button type="submit">Register</button>
    </form>
  </div>
</body>
</html>
